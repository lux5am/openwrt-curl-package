name: Build curl for OpenWrt

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      curl_version:
        description: 'curl version'
        required: false
        default: '8.20.0'

env:
  CURL_VERSION: ${{ github.event.inputs.curl_version || '8.20.0' }}
  SDK_URL: "https://downloads.openwrt.org/releases/24.10.5/targets/armsr/armv8/openwrt-sdk-24.10.5-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"

jobs:
  build-curl:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository (includes openwrt-curl-package/)
      uses: actions/checkout@v6

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential autoconf automake libtool pkg-config \
          flex bison file git subversion python3 \
          wget xz-utils ncurses-dev libssl-dev zlib1g-dev libzstd-dev \
          zstd

    - name: Download and extract OpenWrt SDK
      run: |
        wget -q "${{ env.SDK_URL }}"
        tar -I zstd -xf openwrt-sdk-*.tar.zst
        EXTRACTED_DIR=$(tar -tf openwrt-sdk-*.tar.zst | head -1 | cut -f1 -d'/')
        mv "$EXTRACTED_DIR" openwrt-sdk

    - name: Download curl source
      run: |
        wget -q https://github.com/curl/curl/releases/download/curl-$(echo ${{ env.CURL_VERSION }} | tr . _)/curl-${{ env.CURL_VERSION }}.tar.xz
        tar xf curl-${{ env.CURL_VERSION }}.tar.xz
        cd curl-${{ env.CURL_VERSION }}
        # Apply any custom patches from your repo (if needed)
        if [ -d ../openwrt-curl-package/patches ]; then
          for patch in ../openwrt-curl-package/patches/*.patch; do
            patch -p1 < "$patch"
          done
        fi

    - name: Set up cross‑compile environment
      run: |
        SDK_DIR=$(pwd)/openwrt-sdk
        # Toolchain binaries are inside staging_dir/toolchain-*
        TOOLCHAIN_DIR=$(find $SDK_DIR/staging_dir -maxdepth 1 -name "toolchain-*" -type d | head -1)
        export STAGING_DIR=$SDK_DIR/staging_dir
        export PATH=$TOOLCHAIN_DIR/bin:$PATH
        export CC=aarch64-openwrt-linux-musl-gcc
        export CXX=aarch64-openwrt-linux-musl-g++
        export AR=aarch64-openwrt-linux-musl-ar
        export AS=aarch64-openwrt-linux-musl-as
        export LD=aarch64-openwrt-linux-musl-ld
        export RANLIB=aarch64-openwrt-linux-musl-ranlib
        export STRIP=aarch64-openwrt-linux-musl-strip
        export CFLAGS="-Os -ffunction-sections -fdata-sections"
        export LDFLAGS="-Wl,--gc-sections"
        # Save for later steps
        echo "STAGING_DIR=$STAGING_DIR" >> $GITHUB_ENV
        echo "PATH=$PATH" >> $GITHUB_ENV
        echo "CC=$CC" >> $GITHUB_ENV
        echo "CXX=$CXX" >> $GITHUB_ENV
        echo "AR=$AR" >> $GITHUB_ENV
        echo "LD=$LD" >> $GITHUB_ENV
        echo "RANLIB=$RANLIB" >> $GITHUB_ENV
        echo "STRIP=$STRIP" >> $GITHUB_ENV
        echo "CFLAGS=$CFLAGS" >> $GITHUB_ENV
        echo "LDFLAGS=$LDFLAGS" >> $GITHUB_ENV

    - name: Build zlib (if needed, as static library)
      run: |
        # The SDK may not have prebuilt zlib, so we build it ourselves in the sysroot
        wget -q https://zlib.net/zlib-1.3.1.tar.gz
        tar xf zlib-1.3.1.tar.gz
        cd zlib-1.3.1
        ./configure --prefix=$STAGING_DIR/usr --static
        make -j$(nproc)
        make install

    - name: Build libzstd (static)
      run: |
        wget -q https://github.com/facebook/zstd/releases/download/v1.5.6/zstd-1.5.6.tar.gz
        tar xf zstd-1.5.6.tar.gz
        cd zstd-1.5.6
        make -j$(nproc) PREFIX=$STAGING_DIR/usr install

    - name: Configure and build curl
      run: |
        cd curl-${{ env.CURL_VERSION }}
        ./configure \
          --host=aarch64-openwrt-linux-musl \
          --target=aarch64-openwrt-linux-musl \
          --build=x86_64-linux-gnu \
          --prefix=$STAGING_DIR/usr \
          --enable-shared=no \
          --enable-static=yes \
          --with-zlib=$STAGING_DIR/usr \
          --with-zstd=$STAGING_DIR/usr \
          --disable-ldap \
          --disable-ldaps \
          --disable-rtsp \
          --disable-smb \
          --disable-imap \
          --disable-pop3 \
          --disable-smtp \
          --disable-gopher \
          --disable-manual \
          --disable-docs \
          --without-ssl \
          --without-libssh2 \
          --without-brotli \
          --without-libpsl
        make -j$(nproc)
        # Strip the binary
        $STRIP src/curl

    - name: Upload curl binary
      uses: actions/upload-artifact@v7
      with:
        name: curl-aarch64-openwrt
        path: curl-${{ env.CURL_VERSION }}/src/curl

    - name: Create GitHub Release (on tags)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v3
      with:
        files: curl-${{ env.CURL_VERSION }}/src/curl
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
